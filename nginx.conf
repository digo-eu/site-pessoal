events {
	worker_connections 1024;
}

http {
	server {
		listen			443 ssl;
		ssl_certificate		/etc/ssl/cert.pem;
		ssl_certificate_key 	/etc/ssl/cert.key;
		server_name dev.digo-eu.com www.dev.digo-eu.com;
	}
	server {
		listen			443 ssl;
		ssl_certificate		/etc/ssl/cert.pem;
		ssl_certificate_key 	/etc/ssl/cert.key;

		server_name digo-eu.com www.digo-eu.com;

		location /geoserver/ { proxy_pass http://geoserver:8080/geoserver/; }

		location /frappe-bird {
			root				/usr/share/nginx/html/;
			index				index.html;
			default_type application/javascript;

			# Headers para permitir multithreading (SharedArrayBuffer)
			add_header 'Cross-Origin-Embedder-Policy' 'require-corp';
			add_header 'Cross-Origin-Opener-Policy' 'same-origin';

			# Headers para DESATIVAR o Cache
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
			if_modified_since off;
			expires off;
			etag off;
		}

		location /fibula {
			root				/usr/share/nginx/html/;
			index			  index.html;
			default_type application/javascript;

			# Headers para permitir multithreading (SharedArrayBuffer)
			add_header 'Cross-Origin-Embedder-Policy' 'require-corp';
			add_header 'Cross-Origin-Opener-Policy' 'same-origin';

			# Headers para DESATIVAR o Cache
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
			if_modified_since off;
			expires off;
			etag off;
		}

		# 1. Publish & admin — local/internal only
		#    Matches /database/<name> but NOT /database/<name>/call/... or /database/<name>/subscribe
		location ~ ^/spacetimedb/database/[^/]+(/?$) {
			allow 127.0.0.1;
			allow 172.16.0.0/12;   # Docker bridge subnets
			deny all;

			proxy_pass          http://spacetimedb:3000/database/$1;
			proxy_http_version  1.1;
			proxy_set_header    Host              $host;
			proxy_set_header    X-Forwarded-Proto $scheme;
		}

		# 2. Reducer calls — open to all authenticated clients
		location ~ ^/spacetimedb/database/[^/]+/call/ {
			proxy_pass          http://spacetimedb:3000/;
			proxy_http_version  1.1;
			proxy_set_header    Host              $host;
			proxy_set_header    X-Forwarded-Proto $scheme;
			proxy_set_header    X-Real-IP         $remote_addr;
		}

		# 3. Everything else (subscriptions, identity, etc.) — open, WebSocket-capable
		location /spacetimedb/ {
			proxy_pass          http://spacetimedb:3000/;
			proxy_http_version  1.1;
			proxy_set_header    Upgrade    $http_upgrade;
			proxy_set_header    Connection "upgrade";
			proxy_set_header    Host       $host;
			proxy_set_header    X-Real-IP         $remote_addr;
			proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
			proxy_set_header    X-Forwarded-Proto $scheme;
		}

		location / { 
			proxy_pass http://homepage:3000; 
			# Headers para permitir multithreading (SharedArrayBuffer)
			add_header 'Cross-Origin-Embedder-Policy' 'require-corp';
			add_header 'Cross-Origin-Opener-Policy' 'same-origin';
		}
	}
}
