name: site-pessoal

services:
# NGINX proxy, server and load balancer to manage the internal network
  nginx:
    container_name: nginx
    image: nginx
    ports: 
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./hosted_webapps/:/usr/share/nginx/html/
    secrets:
      - source: nginx_cert
        target: /etc/ssl/cert.pem
      - source: nginx_key
        target: /etc/ssl/cert.key
    networks:
      - sitewide
    restart: unless-stopped

# Homepage with Next.js
  homepage:
    container_name: homepage
    image: digoeu/homepage
    env_file:
      - .env
    working_dir: /app
    networks:
      - sitewide

  geoserver:
    container_name: geoserver
    image: docker.osgeo.org/geoserver:2.25.x
    environment:
      - SKIP_DEMO_DATA=true
    volumes:
      - type: bind
        source: ./geoserver_data/ 
        target: /opt/geoserver_data/
      - type: bind
        source: ./tomcat_config.xml 
        target: /opt/config_overrides/web.xml
    networks:
      - sitewide
    restart: unless-stopped
        
networks:
  sitewide:
    driver: bridge

secrets:
  nginx_cert:
    file: ./certs/cert.pem
  nginx_key:
    file: ./certs/cert.key
