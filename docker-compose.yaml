name: site-pessoal

services:
# NGINX proxy, server and load balancer to manage the internal network
  nginx:
    container_name: nginx
    image: nginx
    ports: 
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./hosted_webapps/:/usr/share/nginx/html/
    secrets:
      - source: nginx_cert
        target: /etc/ssl/cert.pem
      - source: nginx_key
        target: /etc/ssl/cert.key
    networks:
      - sitewide
    restart: unless-stopped

# Homepage with Next.js
  homepage:
    container_name: homepage
    image: digoeu/homepage
    env_file:
      - .env
    working_dir: /app
    networks:
      - sitewide
    restart: unless-stopped

# SpacetimeDB
  spacetimedb:
    container_name: spacetimedb
    image: clockworklabs/spacetime
    command: start
    volumes:
      - type: bind
        source: ./spacetimedb_data/
        target: /stdb
    networks:
      - sitewide
    restart: unless-stopped

  spacetimedb-publish:
    container_name: spacetimedb-publish
    image: clockworklabs/spacetime
    entrypoint: /bin/sh            # override the spacetime entrypoint
    command:
      - -c
      - |
        echo 'Waiting for SpacetimeDB...'
        until spacetime server ping http://spacetimedb:3000 > /dev/null 2>&1; do sleep 1; done
        echo 'Ready. Publishing...'
        cd /module
        printf 'N\ny\n' | spacetime publish --server http://spacetimedb:3000 grade-db
        echo 'Done.'
    volumes:
      - type: bind
        source: /home/digo-eu/grade-db
        target: /module
    networks:
      - sitewide
    depends_on:
      - spacetimedb
    restart: no               # exits cleanly after publishing, never restarts

  geoserver:
    container_name: geoserver
    image: docker.osgeo.org/geoserver:2.25.x
    environment:
      - SKIP_DEMO_DATA=true
    volumes:
      - type: bind
        source: ./geoserver_data/ 
        target: /opt/geoserver_data/
      - type: bind
        source: ./tomcat_config.xml 
        target: /opt/config_overrides/web.xml
    networks:
      - sitewide
    restart: unless-stopped
        
networks:
  sitewide:
    driver: bridge

secrets:
  nginx_cert:
    file: ./certs/cert.pem
  nginx_key:
    file: ./certs/cert.key
